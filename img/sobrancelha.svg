<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <style>
        .eyebrow { transform-origin: 50% 40%; animation: lift 2s infinite ease-in-out; }
        .eye-open { animation: blink-open 2s infinite step-end; }
        .eye-closed { animation: blink-closed 2s infinite step-end; opacity: 0; }
        @keyframes lift { 
            0%, 100% { transform: translateY(0); } 
            10%, 40% { transform: translateY(-12px) rotate(8deg); } 
        }
        @keyframes blink-open { 0%, 100% { opacity: 1; } 10%, 40% { opacity: 0; } }
        @keyframes blink-closed { 0%, 100% { opacity: 0; } 10%, 40% { opacity: 1; } }
    </style>
    <!-- Eyebrow -->
    <path class="eyebrow" d="M 15 40 Q 50 20 85 40" stroke-width="8" />
    <!-- Eye Open -->
    <g class="eye-open">
        <path d="M 20 65 Q 50 45 80 65 Q 50 85 20 65 Z" />
        <circle cx="50" cy="65" r="8" fill="#d4af37" stroke="none" />
    </g>
    <!-- Eye Closed (Wink) -->
    <path class="eye-closed" d="M 20 65 Q 50 75 80 65" />
</svg>

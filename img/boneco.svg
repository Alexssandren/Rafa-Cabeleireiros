<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="#d4af37" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <style>
        .tie { transform-origin: 50% 65%; animation: fix-tie 2s infinite ease-in-out; }
        .hands { transform-origin: 50% 80%; animation: move-hands 2s infinite ease-in-out; }
        @keyframes fix-tie { 
            0%, 100% { transform: rotate(0deg); } 
            15% { transform: rotate(15deg); } 
            30% { transform: rotate(-10deg); } 
            45% { transform: rotate(0deg); } 
        }
        @keyframes move-hands { 
            0%, 100% { transform: translateY(15px) scale(0.8); opacity: 0; } 
            15%, 35% { transform: translateY(-3px) scale(1); opacity: 1; } 
        }
    </style>
    <!-- Head -->
    <circle cx="50" cy="25" r="18" />
    <!-- Shoulders -->
    <path d="M 15 95 Q 15 65 50 65 Q 85 65 85 95" stroke-width="5" />
    <!-- Collar -->
    <path d="M 35 65 L 50 75 L 65 65" />
    <!-- Tie -->
    <polygon class="tie" points="47,75 53,75 58,95 50,105 42,95" fill="#d4af37" stroke="none" />
    <!-- Hands adjusting -->
    <g class="hands">
        <path d="M 40 85 Q 45 75 50 75 Q 55 75 60 85" stroke-width="6" />
        <circle cx="40" cy="85" r="3" fill="#d4af37" />
        <circle cx="60" cy="85" r="3" fill="#d4af37" />
    </g>
</svg>

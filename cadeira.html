<div id="barber-chair" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transform-origin: center center; will-change: transform, opacity;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="300" height="450">
        <g id="chair-group">
            <!-- Base Redonda -->
            <ellipse cx="100" cy="280" rx="70" ry="15" fill="#111" />
            <ellipse cx="100" cy="275" rx="70" ry="15" fill="#333" />
            
            <!-- Coluna Metalica Dourada -->
            <rect x="85" y="220" width="30" height="55" fill="url(#goldGrad)" />
            
            <!-- Assento Principal -->
            <path d="M 40 190 Q 100 210 160 190 L 150 220 Q 100 230 50 220 Z" fill="#151515" stroke="#d4af37" stroke-width="2" />
            <rect x="40" y="180" width="120" height="15" rx="5" fill="#222" />
            
            <!-- Descanso Pés -->
            <path d="M 60 250 L 140 250 L 130 240 L 70 240 Z" fill="#1a1a1a" stroke="#d4af37" stroke-width="1.5" />
            <line x1="100" y1="220" x2="100" y2="240" stroke="#d4af37" stroke-width="6" />
            
            <!-- Encosto Principal -->
            <path d="M 50 80 L 150 80 Q 160 130 150 180 L 50 180 Q 40 130 50 80 Z" fill="#151515" stroke="#d4af37" stroke-width="2" />
            
            <!-- Linhas Verticais do Encosto Estofado -->
            <path d="M 75 82 Q 70 130 75 178" fill="none" stroke="#0a0a0a" stroke-width="4" />
            <path d="M 100 80 V 180" fill="none" stroke="#0a0a0a" stroke-width="4" />
            <path d="M 125 82 Q 130 130 125 178" fill="none" stroke="#0a0a0a" stroke-width="4" />
            
            <!-- Descanso de Braço Esquerdo -->
            <path d="M 35 190 C 20 120 50 120 55 130 C 45 140 45 170 50 180 Z" fill="url(#goldGrad)" />
            <path d="M 40 130 Q 55 125 70 130" fill="none" stroke="#222" stroke-width="6" stroke-linecap="round" />
            
            <!-- Descanso de Braço Direito -->
            <path d="M 165 190 C 180 120 150 120 145 130 C 155 140 155 170 150 180 Z" fill="url(#goldGrad)" />
            <path d="M 160 130 Q 145 125 130 130" fill="none" stroke="#222" stroke-width="6" stroke-linecap="round" />
            
            <!-- Descanso Cabeça -->
            <path d="M 75 50 Q 100 30 125 50 L 120 80 Q 100 70 80 80 Z" fill="#151515" stroke="#d4af37" stroke-width="2" />
            <rect x="90" y="70" width="20" height="10" fill="#444" />
            
            <!-- Gradientes Def -->
            <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#b8860b" />
                    <stop offset="50%" stop-color="#f1c94f" />
                    <stop offset="100%" stop-color="#d4af37" />
                </linearGradient>
            </defs>
        </g>
    </svg>
</div>
